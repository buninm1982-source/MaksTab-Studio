<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#090a0d">
  <title>MaksTab Studio</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="splash" class="splash">
    <div class="logo-wrap">
      <div class="logo-m">M<div class="neck"></div></div>
      <div class="brand-title">Maks<span>Tab</span><small>STUDIO</small></div>
      <p>Играй. Учись. Развивайся.</p>
      <div class="loader"><span></span></div>
    </div>
  </div>

  <main id="app" class="app hidden">
    <section id="homeScreen">
      <section class="hero">
        <img src="maks-photo.jpg" alt="Maks">
        <div class="hero-overlay"></div>

        <header class="topbar">
          <div class="mini-brand">
            <b>Maks<span>Tab</span></b>
            <small>STUDIO</small>
          </div>
          <button id="openMaestro" class="round-btn" aria-label="Маэстро">🎩</button>
        </header>

        <div class="hero-copy">
          <div class="tagline">Играй. Учись. Развивайся.</div>
          <h1>Привет, <span>Maks!</span></h1>
          <p>Сегодня отличный день, чтобы сыграть что-то новое.</p>
        </div>
      </section>

      <section class="menu">
        <button id="startLesson" class="menu-card primary">
          <span class="menu-icon">▶</span>
          <span class="menu-copy">
            <b>Начать урок</b>
            <small>Тренажёр уже работает</small>
          </span>
          <span class="arrow">›</span>
        </button>

        <button class="menu-card" data-toast="Раздел «Мои песни» появится в следующей версии">
          <span class="menu-icon">♫</span>
          <span class="menu-copy"><b>Мои песни</b><small>Сохранённые табы</small></span>
          <span class="arrow">›</span>
        </button>

        <button class="menu-card" data-toast="Уроки и упражнения скоро добавим">
          <span class="menu-icon">🎓</span>
          <span class="menu-copy"><b>Уроки и упражнения</b><small>Техника и ритм</small></span>
          <span class="arrow">›</span>
        </button>

        <button class="menu-card" data-toast="Импорт табулатур будет в следующей версии">
          <span class="menu-icon tab-icon">TAB</span>
          <span class="menu-copy"><b>Табулатуры</b><small>Импорт и библиотека</small></span>
          <span class="arrow">›</span>
        </button>

        <button class="menu-card" data-toast="Избранное пока пустое. Даже Маэстро грустит">
          <span class="menu-icon">★</span>
          <span class="menu-copy"><b>Избранное</b><small>Любимые песни и уроки</small></span>
          <span class="arrow">›</span>
        </button>
      </section>
    </section>

    <section id="trainerScreen" class="trainer hidden-screen">
      <header class="trainer-header">
        <button id="backHome" class="round-btn">‹</button>
        <div>
          <b>Первый урок</b>
          <small>Играй по красной линии</small>
        </div>
        <button id="trainerMaestro" class="round-btn">🎩</button>
      </header>

      <div class="lesson-panel">
        <div class="lesson-name">Упражнение: первая струна</div>
        <div id="countdown" class="countdown"></div>

        <div id="tabStage" class="tab-stage">
          <div class="string-labels">
            <span>e</span><span>B</span><span>G</span><span>D</span><span>A</span><span>E</span>
          </div>
          <div id="strings" class="strings"></div>
          <div class="playhead"><small>ИГРАЙ</small></div>
        </div>

        <div id="status" class="status">
          Маэстро ждёт. Гитара делает вид, что спокойна.
        </div>
      </div>

      <div class="transport">
        <button id="playBtn" class="gold-btn">▶ Старт</button>
        <button id="pauseBtn">⏸ Пауза</button>
        <button id="restartBtn">↺ Сначала</button>
      </div>

      <label class="range-row">
        <span>Темп</span>
        <input id="tempo" type="range" min="45" max="120" value="70">
        <b id="tempoValue">70 BPM</b>
      </label>
    </section>

    <div id="maestroModal" class="modal hidden-screen">
      <div class="modal-card">
        <button id="closeMaestro" class="close-btn">×</button>
        <div class="maestro-emoji">🎩</div>
        <h2>Маэстро</h2>
        <p id="maestroText"></p>
        <button id="nextMaestro" class="gold-btn">Ещё реплика</button>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
